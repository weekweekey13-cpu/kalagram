# Keeps free Render dyno awake by pinging every 15 minutes.
# Without this, the process sleeps and cold-starts take ~30–60s.
name: Keep-alive

on:
  schedule:
    # every 15 minutes (UTC)
    - cron: "*/15 * * * *"
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Wake Калаграм
        run: |
          set -e
          URL="${KEEPALIVE_URL:-https://kalagram-z20h.onrender.com/api/keepalive}"
          echo "Pinging $URL"
          # up to 3 tries — cold start can be slow
          for i in 1 2 3; do
            if curl -fsS --max-time 90 "$URL"; then
              echo
              echo "OK (try $i)"
              exit 0
            fi
            echo "try $i failed, retry…"
            sleep 10
          done
          echo "All tries failed"
          exit 1
        env:
          KEEPALIVE_URL: https://kalagram-z20h.onrender.com/api/keepalive
