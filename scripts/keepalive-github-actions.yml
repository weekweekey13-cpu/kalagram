# Copy of .github/workflows/keepalive.yml — for reference if workflow push is blocked.
# Prefer setting UptimeRobot (see static/keepalive-setup.html or /keepalive-setup).
name: Keep-alive

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 4
    steps:
      - name: Wake Калаграм
        run: |
          set -e
          URL="https://kalagram-z20h.onrender.com/api/ping"
          for i in 1 2 3 4 5; do
            code=$(curl -sS -o /tmp/ka_body.txt -w "%{http_code}" --max-time 100 "$URL" || echo "000")
            echo "try $i → HTTP $code"
            [ "$code" = "200" ] && exit 0
            sleep 12
          done
          exit 1
